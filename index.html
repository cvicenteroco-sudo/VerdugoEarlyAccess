<!DOCTYPE html>
<html lang="es">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>P4r4s1t0 ‚ÄĒ Verdugo Early Access</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#020302;
      --panel:#000;
      --green:#8dff86;
      --green-soft:#d7ffd4;
      --line:rgba(141,255,134,.16);
    }

    *{box-sizing:border-box}

    html,body{
      margin:0;
      background:radial-gradient(circle at top, rgba(0,255,120,.08), transparent 28%), var(--bg);
      color:var(--green);
      font-family:"IBM Plex Mono","Share Tech Mono",monospace;
      display:flex;
      align-items:center;
      justify-content:center;
      min-height:100vh;
      overflow-x:hidden;
      overflow-y:auto;
    }

    .screen{
      width:min(980px,95vw);
      min-height:min(640px,92vh);
      background:var(--panel);
      border:1px solid var(--line);
      box-shadow:0 0 50px rgba(0,255,120,.14), inset 0 0 30px rgba(141,255,134,.03);
      position:relative;
      overflow:hidden;
      padding:clamp(22px,3vw,40px);
    }

    .scanlines,.noise,.vignette{
      position:absolute;
      inset:0;
      pointer-events:none;
    }

    .scanlines{
      background:repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,.035),
        rgba(255,255,255,.035) 1px,
        transparent 2px,
        transparent 4px
      );
      opacity:.35;
      z-index:4;
    }

    .noise{
      background-image:
        radial-gradient(circle at 20% 30%, rgba(255,255,255,.22) .7px, transparent 1px),
        radial-gradient(circle at 70% 60%, rgba(255,255,255,.18) .7px, transparent 1px),
        radial-gradient(circle at 30% 80%, rgba(255,255,255,.14) .8px, transparent 1.2px);
      background-size:120px 120px,140px 140px,170px 170px;
      opacity:.08;
      animation:noiseShift .3s steps(2) infinite;
      z-index:1;
    }

    .vignette{
      background:radial-gradient(circle, transparent 45%, rgba(0,0,0,.45) 100%);
      z-index:2;
    }

    .panel{
      position:relative;
      z-index:5;
      min-height:100%;
    }

    .center{
      display:flex;
      align-items:center;
      justify-content:center;
      height:100%;
      text-align:center;
      flex-direction:column;
    }

    .hidden{
      display:none !important;
    }

    .typed-wrap{
      display:flex;
      align-items:center;
      justify-content:center;
      width:100%;
      min-height:220px;
      overflow:hidden;
      padding:0 8px;
    }

    .typed{
      font-size:clamp(7px,1vw,12px);
      line-height:1.05;
      color:var(--green-soft);
      white-space:pre;
      text-align:center;
    }

    .subtitle{
      margin-top:10px;
      opacity:.85;
      font-size:clamp(14px,1.5vw,18px);
    }

    .terminal{
      max-width:560px;
      margin:auto;
      text-align:left;
      font-size:clamp(14px,1.4vw,18px);
      line-height:1.7;
    }

    .term-line{
      opacity:0;
      min-height:1.5em;
      white-space:pre-wrap;
    }

    .term-line.show{
      opacity:1;
    }

    .prompt{
      color:var(--green-soft);
    }

    .link{
      color:var(--green);
      text-decoration:none;
      border-bottom:1px solid rgba(141,255,134,.4);
      white-space:nowrap;
      font-size:.95em;
    }

    .actions{
      margin-top:26px;
      display:flex;
      gap:12px;
      flex-wrap:wrap;
    }

    button{
      padding:14px 22px;
      background:transparent;
      border:1px solid var(--green);
      color:var(--green);
      font-family:inherit;
      font-size:16px;
      cursor:pointer;
      transition:.18s ease;
    }

    button:hover{
      background:var(--green);
      color:#000;
    }

    .video-shell{
      min-height:100%;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      gap:16px;
      text-align:center;
    }

    .video-wrap{
      width:100%;
      max-width:800px;
      border:1px solid var(--line);
      box-shadow:0 0 20px rgba(141,255,134,.08);
    }

    .video-wrap iframe{
      width:100%;
      aspect-ratio:16/9;
      border:none;
      display:block;
    }

    .video-note{
      font-size:14px;
      opacity:.75;
      line-height:1.6;
      margin-top:10px;
    }

    .cursor{
      display:inline-block;
      width:10px;
      height:1.1em;
      background:var(--green);
      margin-left:6px;
      animation:blink 1s infinite;
    }

    @keyframes blink{
      0%,100%{opacity:1}
      50%{opacity:0}
    }

    @keyframes noiseShift{
      0%{transform:translate(0)}
      50%{transform:translate(1px,-1px)}
      100%{transform:translate(0)}
    }

    @media(max-width:700px){
      .screen{
        min-height:100vh;
        width:100vw;
        border:none;
      }
    }
  </style>
</head>

‚Ėą‚Ėą‚ēĎ          ‚Ėą‚Ėą‚ēĎ‚Ėą‚Ėą‚ēĎ  ‚Ėą‚Ėą‚ēĎ      ‚Ėą‚Ėą‚ēĎ‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēĎ‚Ėą‚Ėą‚ēĎ   ‚Ėą‚Ėą‚ēĎ   ‚ēö‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēĒ‚ēĚ
‚ēö‚ēź‚ēĚ          ‚ēö‚ēź‚ēĚ‚ēö‚ēź‚ēĚ  ‚ēö‚ēź‚ēĚ      ‚ēö‚ēź‚ēĚ‚ēö‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēĚ‚ēö‚ēź‚ēĚ   ‚ēö‚ēź‚ēĚ    ‚ēö‚ēź‚ēź‚ēź‚ēź‚ēź‚ēĚ`;

    typeAscii(document.getElementById('typedP'), pText, 2);

    setTimeout(() => {
      document.getElementById('s1').classList.add('hidden');
      document.getElementById('s2').classList.remove('hidden');

      typeAscii(document.getElementById('typedV'), vText, 2, () => {
        document.getElementById('eaLabel').classList.remove('hidden');
      });
    }, 5200);

    setTimeout(() => {
      document.getElementById('s2').classList.add('hidden');
      document.getElementById('s3').classList.remove('hidden');
      showTerms();
    }, 9800);

    function startCountdown(){
      const target = new Date('2026-04-15T00:00:00-06:00');

      function update(){
        const now = new Date();
        const diff = target - now;

        if(diff <= 0){
          document.getElementById('countdownTimer').textContent = '> expired';
          return;
        }

        const days = Math.floor(diff / (1000 * 60 * 60 * 24));
        const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
        const minutes = Math.floor((diff / (1000 * 60)) % 60);
        const seconds = Math.floor((diff / 1000) % 60);

        document.getElementById('countdownTimer').textContent =
          `> ${days}d ${hours}h ${minutes}m ${seconds}s`;
      }

      update();
      setInterval(update, 1000);
    }

    setTimeout(startCountdown, 9800);

    document.getElementById('unlockBtn').addEventListener('click', () => {
      document.getElementById('s3').classList.add('hidden');
      document.getElementById('s4').classList.remove('hidden');
